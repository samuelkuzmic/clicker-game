<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>
  <style>
    body { font-family: Arial; background:#f0f0f0; margin:0; padding:10px; display:flex; flex-wrap:wrap; gap:20px; }
    .column { background:#fff; border-radius:8px; padding:10px; max-width:300px; flex:1 1 300px; display:flex; flex-direction:column; }
    button { cursor:pointer; border-radius:5px; border:none; padding:8px; margin:3px 0; width:100%; word-wrap:break-word; font-size:12px; }
    #clickButton { height:50px; font-size:16px; background:#4CAF50; color:white; }
    .upgradeBtn { background:#2196F3; color:white; }
    .stat { margin:5px 0; font-size:14px; }
    input[type=number]{width:100%; margin:3px 0; padding:5px; border-radius:5px; border:1px solid #ccc;}
  </style>
</head>
<body>

<div class="column" id="clickColumn">
  <h3>Clicks</h3>
  <button id="clickButton">Click!</button>
  <div class="stat" id="score">Clicks: 0</div>
  <div class="stat" id="clickPowerStat">Clicks per click: 1</div>
  <div id="clickUpgrades"></div>
</div>

<div class="column" id="moneyColumn">
  <h3>Money</h3>
  <div class="stat" id="money">Money: $0</div>
  <div class="stat" id="moneyBonusStat">Money Bonus: 0%</div>
  <div id="moneyUpgrades"></div>
</div>

<div class="column" id="autoColumn">
  <h3>AutoClicker</h3>
  <div class="stat" id="autoStats">AutoClickers: 0 | Total AutoClicks: 0 | Power: 1 | Speed: 1s</div>
  <div id="autoUpgrades"></div>
</div>

<div class="column" id="sellerColumn">
  <h3>AutoSeller</h3>
  <div class="stat" id="autoSellerStats">Level: 0 | Power: 1 | Status: ON</div>
  <button id="toggleSeller">Toggle ON/OFF</button>
  <div id="autoSellerUpgrades"></div>
</div>

<div class="column" id="rebirthColumn">
  <h3>Rebirth & Permanent Upgrades</h3>
  <div class="stat" id="rebirthPoints">Rebirth Points: 0</div>
  <div class="stat" id="rebirthRequirement">Rebirth requires 1,000,000 clicks</div>
  <button class="upgradeBtn" id="rebirth">Rebirth</button>
  <div id="permUpgrades"></div>
</div>

<div class="column" id="bankColumn">
  <h3>Bank</h3>
  <div class="stat" id="bankMoney">Bank: $0</div>
  <input type="number" id="depositAmount" placeholder="Amount to deposit">
  <button id="depositBtn">Deposit</button>
  <input type="number" id="withdrawAmount" placeholder="Amount to withdraw">
  <button id="withdrawBtn">Withdraw</button>
</div>

<script>
/* ====== GAME STATE ====== */
let clicks = 0, money = 0, clicksPerClick = 1;
let autoLevel = 0, autoPower = 1, autoClicks = 0, autoClickerCost = 100;
let autoClickInterval = 1000, autoClickTimer = null;
let autoSellerLevel = 0, autoSellerPower = 1, autoSellerOn = true;
let rebirthPoints = 0;
let permanentUpgrades = {clickBonus:0, autoBonus:0, moneyBonus:0};
let rebirthBoughtCount = {};
let bank = 0;

/* ====== UPGRADES ====== */
const upgrades = {
  clickUpgrades:[
    {name:"Click +1", cost:10, power:1},
    {name:"Click +5", cost:50, power:5},
    {name:"Clicker Multiplier", cost:200, power:2},
    {name:"Click +10", cost:500, power:10},
    {name:"Click x3", cost:1000, power:3}
  ],
  moneyUpgrades:[
    {name:"Sell 10 Clicks → $5", clickCost:10, moneyGain:5},
    {name:"Sell 50 Clicks → $30", clickCost:50, moneyGain:30},
    {name:"Sell 100 Clicks → $70", clickCost:100, moneyGain:70},
    {name:"Sell 1000 Clicks → $800", clickCost:1000, moneyGain:800},
    {name:"Sell 10000 Clicks → $10000", clickCost:10000, moneyGain:10000},
    {name:"Sell 100000 Clicks → $100000", clickCost:100000, moneyGain:100000},
    {name:"Sell 1000000 Clicks → $500000", clickCost:1000000, moneyGain:500000}
  ],
  autoUpgrades:[
    {name:"Buy AutoClicker", autoClickCost:0, powerIncrease:0, buyCost:100},
    {name:"AutoClicker Power +1", autoClickCost:5, powerIncrease:1},
    {name:"AutoClicker Power +2", autoClickCost:20, powerIncrease:2},
    {name:"AutoClicker Speed -0.1s", autoClickCost:50, speedDecrease:100},
    {name:"AutoClicker +5 Power", autoClickCost:100, powerIncrease:5},
    {name:"AutoClicker +10 Power", autoClickCost:200, powerIncrease:10}
  ],
  sellerUpgrades:[
    {name:"AutoSeller +1", cost:100},
    {name:"AutoSeller +2", cost:300},
    {name:"AutoSeller Power +1", cost:500},
    {name:"AutoSeller Power +2", cost:1000},
    {name:"AutoSeller Speed x2", cost:2000}
  ],
  permUpgrades:[
    {name:"Click Bonus +2", cost:1, type:"clickBonus", power:2},
    {name:"Click Bonus +5", cost:2, type:"clickBonus", power:5},
    {name:"Auto Bonus +2", cost:2, type:"autoBonus", power:2},
    {name:"Money Bonus +10%", cost:3, type:"moneyBonus", power:10},
    {name:"Money Bonus +20%", cost:5, type:"moneyBonus", power:20}
  ]
};

/* Save original costs for persistence */
upgrades.clickUpgrades.forEach(u=>u.baseCost=u.cost);
upgrades.moneyUpgrades.forEach(u=>u.baseClickCost=u.clickCost);
upgrades.autoUpgrades.forEach(u=>{
  u.baseAutoClickCost = u.autoClickCost;
  if(u.buyCost) u.baseBuyCost = u.buyCost;
});
upgrades.sellerUpgrades.forEach(u=>u.baseCost=u.cost);

/* ====== LOAD LOCAL STORAGE ====== */
try {
  const data = JSON.parse(localStorage.getItem("clickerGameData")||"{}");
  if(data) {
    clicks = data.clicks || 0;
    money = data.money || 0;
    clicksPerClick = data.clicksPerClick || 1;
    autoLevel = data.autoLevel || 0;
    autoPower = data.autoPower || 1;
    autoClicks = data.autoClicks || 0;
    autoClickerCost = data.autoClickerCost || 100;
    autoClickInterval = data.autoClickInterval || 1000;
    autoSellerLevel = data.autoSellerLevel || 0;
    autoSellerPower = data.autoSellerPower || 1;
    autoSellerOn = data.autoSellerOn !== undefined ? data.autoSellerOn : true;
    rebirthPoints = data.rebirthPoints || 0;
    permanentUpgrades = data.permanentUpgrades || {clickBonus:0, autoBonus:0, moneyBonus:0};
    rebirthBoughtCount = data.rebirthBoughtCount || {};
    bank = data.bank || 0;

    // Load upgrade costs
    if(data.upgradeCosts){
      for(const key in data.upgradeCosts){
        data.upgradeCosts[key].forEach((cost,i)=>{
          if(upgrades[key][i]) upgrades[key][i].cost = cost;
        });
      }
    }
  }
} catch(e){ console.warn("Failed to load save data", e); }

/* ====== DOM ====== */
const scoreEl=document.getElementById("score");
const clickPowerStat=document.getElementById("clickPowerStat");
const moneyEl=document.getElementById("money");
const moneyBonusStat=document.getElementById("moneyBonusStat");
const autoStatsEl=document.getElementById("autoStats");
const autoSellerStatsEl=document.getElementById("autoSellerStats");
const rebirthPointsEl=document.getElementById("rebirthPoints");
const bankMoneyEl=document.getElementById("bankMoney");
const clickBtn=document.getElementById("clickButton");
const clickUpgradesDiv=document.getElementById("clickUpgrades");
const moneyUpgradesDiv=document.getElementById("moneyUpgrades");
const autoUpgradesDiv=document.getElementById("autoUpgrades");
const autoSellerUpgradesDiv=document.getElementById("autoSellerUpgrades");
const permUpgradesDiv=document.getElementById("permUpgrades");
const toggleSellerBtn=document.getElementById("toggleSeller");
const depositBtn=document.getElementById("depositBtn");
const withdrawBtn=document.getElementById("withdrawBtn");
const depositAmount=document.getElementById("depositAmount");
const withdrawAmount=document.getElementById("withdrawAmount");

/* ====== UTILS ====== */
function updateStats(){
  scoreEl.innerText = `Clicks: ${clicks}`;
  clickPowerStat.innerText = `Clicks per click: ${clicksPerClick + (permanentUpgrades.clickBonus||0)}`;
  moneyEl.innerText = `Money: $${money}`;
  moneyBonusStat.innerText = `Money Bonus: ${permanentUpgrades.moneyBonus||0}%`;
  autoStatsEl.innerText = `AutoClickers: ${autoLevel} | Total AutoClicks: ${autoClicks} | Power: ${autoPower} | Speed: ${(autoClickInterval/1000).toFixed(2)}s`;
  autoSellerStatsEl.innerText = `Level: ${autoSellerLevel} | Power: ${autoSellerPower} | Status: ${autoSellerOn?"ON":"OFF"}`;
  rebirthPointsEl.innerText = `Rebirth Points: ${rebirthPoints}`;
  bankMoneyEl.innerText = `Bank: $${bank}`;

  /* Save */
  const upgradeCosts = {
    clickUpgrades: upgrades.clickUpgrades.map(u=>u.cost),
    moneyUpgrades: upgrades.moneyUpgrades.map(u=>u.clickCost),
    autoUpgrades: upgrades.autoUpgrades.map(u=>u.autoClickCost || u.buyCost || 0),
    sellerUpgrades: upgrades.sellerUpgrades.map(u=>u.cost)
  };

  localStorage.setItem("clickerGameData",JSON.stringify({
    clicks, money, clicksPerClick, autoLevel, autoPower, autoClicks, autoClickerCost, autoClickInterval,
    autoSellerLevel, autoSellerPower, autoSellerOn, rebirthPoints, permanentUpgrades, rebirthBoughtCount, bank,
    upgradeCosts
  }));
}

function addMoney(amount){ money += Math.floor(amount*(1+(permanentUpgrades.moneyBonus||0)/100)); }
function parsePositiveNumber(val){ const n = Number(val); return (!isNaN(n) && n>0 && Number.isFinite(n)) ? n : 0; }

/* ====== CLICK ====== */
clickBtn.addEventListener("click",()=>{ clicks += clicksPerClick + (permanentUpgrades.clickBonus||0); updateStats(); });

/* ====== BUILD UPGRADE BUTTONS ====== */
function buildUpgrades(){
  // Click Upgrades
  clickUpgradesDiv.innerHTML="";
  upgrades.clickUpgrades.forEach(u=>{
    const btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.innerText=`${u.name} ($${u.cost})`;
    btn.onclick=()=>{
      if(clicks>=u.cost){ clicks-=u.cost; clicksPerClick+=u.power; u.cost=Math.floor(u.cost*1.5); updateStats(); buildUpgrades(); }
    };
    clickUpgradesDiv.appendChild(btn);
  });

  // Money Upgrades
  moneyUpgradesDiv.innerHTML="";
  upgrades.moneyUpgrades.forEach(u=>{
    const btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.innerText=`${u.name} (Cost: ${u.clickCost} Clicks)`;
    btn.onclick=()=>{
      if(clicks>=u.clickCost){ clicks-=u.clickCost; addMoney(u.moneyGain); u.clickCost=Math.floor(u.clickCost*1.5); updateStats(); buildUpgrades(); }
    };
    moneyUpgradesDiv.appendChild(btn);
  });

  // AutoClicker Upgrades
  autoUpgradesDiv.innerHTML="";
  upgrades.autoUpgrades.forEach(u=>{
    const btn=document.createElement("button");
    btn.className="upgradeBtn";
    let costLabel = u.buyCost ? `$${u.buyCost}` : `${u.autoClickCost} AutoClicks`;
    btn.innerText=`${u.name} (${costLabel})`;
    btn.onclick=()=>{
      if(u.buyCost && money>=u.buyCost){ money-=u.buyCost; autoLevel++; u.buyCost=Math.floor(u.buyCost*1.5); updateStats(); buildUpgrades(); }
      else if(u.autoClickCost && autoClicks>=u.autoClickCost){ autoClicks-=u.autoClickCost; if(u.powerIncrease) autoPower+=u.powerIncrease; if(u.speedDecrease){ autoClickInterval-=u.speedDecrease; if(autoClickInterval<100) autoClickInterval=100; restartAutoClicker(); } u.autoClickCost=Math.floor(u.autoClickCost*1.5); updateStats(); buildUpgrades(); }
    };
    autoUpgradesDiv.appendChild(btn);
  });

  // AutoSeller Upgrades
  autoSellerUpgradesDiv.innerHTML="";
  upgrades.sellerUpgrades.forEach(u=>{
    const btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.innerText=`${u.name} ($${u.cost})`;
    btn.onclick=()=>{
      if(money>=u.cost){ money-=u.cost; autoSellerLevel++; autoSellerPower++; u.cost=Math.floor(u.cost*1.5); updateStats(); buildUpgrades(); }
    };
    autoSellerUpgradesDiv.appendChild(btn);
  });

  // Permanent Upgrades
  permUpgradesDiv.innerHTML="";
  upgrades.permUpgrades.forEach((u,i)=>{
    const btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.innerText=`${u.name} (${u.cost} RP)`;
    btn.onclick=()=>{
      if(rebirthPoints>=u.cost){ rebirthPoints-=u.cost; permanentUpgrades[u.type]+=(u.power||0); rebirthBoughtCount[i]=(rebirthBoughtCount[i]||0)+1; updateStats(); buildUpgrades(); }
    };
    permUpgradesDiv.appendChild(btn);
  });
}
buildUpgrades();

/* ====== AUTOCLICKER ====== */
function autoClickerTick(){ if(autoLevel>0){ let gen = autoLevel*(autoPower+(permanentUpgrades.autoBonus||0)); autoClicks+=gen; clicks+=gen; updateStats(); } }
function restartAutoClicker(){ if(autoClickTimer) clearInterval(autoClickTimer); autoClickTimer = setInterval(autoClickerTick, autoClickInterval); }
restartAutoClicker();

/* ====== AUTOSSELLER ====== */
setInterval(()=>{ if(autoSellerOn && autoSellerLevel>0){ let sellAmount=autoSellerLevel*autoSellerPower; if(clicks>=sellAmount){ clicks-=sellAmount; addMoney(sellAmount); updateStats(); } } },1000);

/* ====== TOGGLE SELLER ====== */
toggleSellerBtn.addEventListener("click",()=>{ autoSellerOn=!autoSellerOn; updateStats(); });

/* ====== BANK ====== */
depositBtn.addEventListener("click",()=>{
  const amt=parsePositiveNumber(depositAmount.value);
  if(amt>0 && money>=amt){ money-=amt; bank+=amt; depositAmount.value=""; updateStats(); } else alert("Not enough money or invalid amount!");
});
withdrawBtn.addEventListener("click",()=>{
  const amt=parsePositiveNumber(withdrawAmount.value);
  if(amt>0 && bank>=amt){ bank-=amt; money+=amt; withdrawAmount.value=""; updateStats(); } else alert("Not enough money in bank or invalid amount!");
});

/* ====== REBIRTH ====== */
document.getElementById("rebirth").addEventListener("click",()=>{
  const requirement=1000000;
  if(clicks>=requirement){
    rebirthPoints+=Math.floor(clicks/requirement);
    clicks=0; money=0; clicksPerClick=1; autoLevel=0; autoPower=1; autoClicks=0; autoClickerCost=100; autoClickInterval=1000;
    autoSellerLevel=0; autoSellerPower=1; bank=0;
    // Reset upgrade costs
    upgrades.clickUpgrades.forEach(u=>u.cost=u.baseCost);
    upgrades.moneyUpgrades.forEach(u=>u.clickCost=u.baseClickCost);
    upgrades.autoUpgrades.forEach(u=>{ if(u.autoClickCost) u.autoClickCost=u.baseAutoClickCost; if(u.buyCost) u.buyCost=u.baseBuyCost; });
    upgrades.sellerUpgrades.forEach(u=>u.cost=u.baseCost);
    restartAutoClicker();
    updateStats();
    buildUpgrades();
  } else alert("Not enough clicks to rebirth!");
});

/* ====== AUTO SAVE ====== */
setInterval(updateStats,3000);
</script>

</body>
</html>
