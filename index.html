```html
<!DOCTYPE html>
<html>
<head>
<title>Clicker Game</title>
<style>
body { font-family: Arial; background:#f0f0f0; margin:0; padding:10px; display:flex; flex-wrap:wrap; gap:20px; }
.column { background:#fff; border-radius:8px; padding:10px; max-width:300px; flex:1 1 300px; display:flex; flex-direction:column; }
button { cursor:pointer; border-radius:5px; border:none; padding:8px; margin:3px 0; width:100%; word-wrap:break-word; font-size:12px; }
#clickButton { height:50px; font-size:16px; background:#4CAF50; color:white; }
.upgradeBtn { background:#2196F3; color:white; }
.stat { margin:5px 0; font-size:14px; }
input[type=number]{width:100%; margin:3px 0; padding:5px; border-radius:5px; border:1px solid #ccc;}
</style>
</head>
<body>

<div class="column">
<h3>Clicks</h3>
<button id="clickButton">Click!</button>
<div class="stat" id="score"></div>
<div class="stat" id="clickPowerStat"></div>
<div id="clickUpgrades"></div>
</div>

<div class="column">
<h3>Money</h3>
<div class="stat" id="money"></div>
<div class="stat" id="moneyBonusStat"></div>
<div id="moneyUpgrades"></div>
</div>

<div class="column">
<h3>AutoClicker</h3>
<div class="stat" id="autoStats"></div>
<div id="autoUpgrades"></div>
</div>

<div class="column">
<h3>AutoSeller</h3>
<div class="stat" id="autoSellerStats"></div>
<button id="toggleSeller">Toggle ON/OFF</button>
<div id="autoSellerUpgrades"></div>
</div>

<div class="column">
<h3>Rebirth</h3>
<div class="stat" id="rebirthPoints"></div>
<button class="upgradeBtn" id="rebirth">Rebirth</button>
<div id="permUpgrades"></div>
</div>

<div class="column">
<h3>Bank</h3>
<div class="stat" id="bankMoney"></div>
<div class="stat" id="bankTimer"></div>
<input type="number" id="depositAmount">
<button id="depositBtn">Deposit</button>
<input type="number" id="withdrawAmount">
<button id="withdrawBtn">Withdraw</button>
</div>

<script>

/* ===== GAME STATE ===== */
let game = {
clicks:0,money:0,clicksPerClick:1,
autoLevel:0,autoPower:1,autoClicks:0,autoClickInterval:1000,
autoSellerLevel:0,autoSellerPower:1,autoSellerOn:true,
rebirthPoints:0,
permanentUpgrades:{clickBonus:0,autoBonus:0,moneyBonus:0,autoMultiplier:1,autoMultiplierLevel:0},
autoMultiplier:1,
bank:0,lastBankUpdate:Date.now(),
upgradeCosts:{}
};

let autoClickTimer=null;

/* ===== UTIL ===== */
function getCost(base,scale,i){
if(!game.upgradeCosts[i]) game.upgradeCosts[i]=base;
return Math.floor(game.upgradeCosts[i]*scale);
}

/* ===== SAVE/LOAD ===== */
function saveGame(){localStorage.setItem("clickerGameData",JSON.stringify(game));}
function loadGame(){let d=JSON.parse(localStorage.getItem("clickerGameData")||"{}");Object.assign(game,d);}

/* ===== BANK ===== */
function updateBank(){
let now=Date.now();
let mins=Math.floor((now-game.lastBankUpdate)/60000);
if(mins>0){
game.bank*=Math.pow(1.5,mins);
game.lastBankUpdate=now;
}
}

/* ===== UPDATE ===== */
function updateStats(){

updateBank();

score.innerText=`Clicks: ${Math.floor(game.clicks)}`;
clickPowerStat.innerText=`Clicks per click: ${game.clicksPerClick+game.permanentUpgrades.clickBonus}`;
money.innerText=`Money: $${Math.floor(game.money)}`;
moneyBonusStat.innerText=`Money Bonus: ${game.permanentUpgrades.moneyBonus}%`;

autoStats.innerText=`AutoClickers: ${game.autoLevel} | Power: ${game.autoPower}`;

autoSellerStats.innerText=`Level: ${game.autoSellerLevel} | Power: ${game.autoSellerPower} | ${game.autoSellerOn?"ON":"OFF"}`;

rebirthPoints.innerText=`Rebirth Points: ${game.rebirthPoints}`;

bankMoney.innerText=`Bank Clicks: ${Math.floor(game.bank)}`;

let t=60000-(Date.now()-game.lastBankUpdate);
bankTimer.innerText=`Next growth in ${(t/1000).toFixed(1)}s`;

saveGame();
}

/* ===== CLICK ===== */
clickButton.onclick=()=>{
game.clicks+=game.clicksPerClick+game.permanentUpgrades.clickBonus;
updateStats();
};

/* ===== AUTO ===== */
function autoClickerTick(){
if(game.autoLevel>0){
let permMulti=Math.pow(game.permanentUpgrades.autoMultiplier,0.75);
let tempMulti=Math.pow(game.autoMultiplier,0.75);

let gen=game.autoLevel*(game.autoPower+game.permanentUpgrades.autoBonus)*permMulti*tempMulti;

game.autoClicks+=gen;
game.clicks+=gen;
updateStats();
}
}
function restartAutoClicker(){
clearInterval(autoClickTimer);
autoClickTimer=setInterval(autoClickerTick,game.autoClickInterval);
}
restartAutoClicker();

/* ===== BANK PASSIVE ===== */
setInterval(()=>{
game.bank*=1.5;
game.lastBankUpdate=Date.now();
updateStats();
},60000);

/* ===== AUTOSSELLER ===== */
setInterval(()=>{
if(game.autoSellerOn && game.autoSellerLevel>0){
let sell=game.autoSellerLevel*game.autoSellerPower;
if(game.clicks>=sell){
game.clicks-=sell;
game.money+=sell*(1+game.permanentUpgrades.moneyBonus/100);
updateStats();
}
}
},1000);

/* ===== BUTTONS ===== */
depositBtn.onclick=()=>{
let amt=+depositAmount.value||0;
if(amt>0 && game.clicks>=amt){
game.clicks-=amt;
game.bank+=amt;
updateStats();
}
};

withdrawBtn.onclick=()=>{
let amt=+withdrawAmount.value||0;
if(amt>0 && game.bank>=amt){
game.bank-=amt;
game.clicks+=amt;
updateStats();
}
};

toggleSeller.onclick=()=>{
game.autoSellerOn=!game.autoSellerOn;
updateStats();
};

/* ===== REBIRTH ===== */
rebirth.onclick=()=>{
if(game.clicks>=1000000){
game.rebirthPoints+=Math.floor(game.clicks/1000000);

game.clicks=0;game.money=0;
game.autoLevel=0;game.autoPower=1;
game.autoClicks=0;game.autoMultiplier=1;
game.bank=0;
game.upgradeCosts={};

updateStats();
buildUpgrades();
}
};

/* ===== UPGRADES ===== */
function buildUpgrades(){

clickUpgrades.innerHTML="";
autoUpgrades.innerHTML="";
permUpgrades.innerHTML="";

/* CLICK */
[
{name:"Click +1",base:10,p:1},
{name:"Click x2",base:100,p:2}
].forEach((u,i)=>{

let cost=getCost(u.base,1.15,"c"+i);

let btn=document.createElement("button");
btn.className="upgradeBtn";
btn.innerText=`${u.name} (${cost})`;

btn.onclick=()=>{
if(game.clicks>=cost){
game.clicks-=cost;

if(u.name.includes("x")) game.clicksPerClick*=u.p;
else game.clicksPerClick+=u.p;

game.upgradeCosts["c"+i]=cost;
updateStats();
buildUpgrades();
}
};

clickUpgrades.appendChild(btn);
});

/* AUTO */
[
{name:"Buy Auto",base:100,type:"buy"},
{name:"Power +1",base:50,type:"power"},
{name:"Auto Mult x2",base:200,type:"multi"}
].forEach((u,i)=>{

let cost=getCost(u.base,1.2,"a"+i);

let btn=document.createElement("button");
btn.className="upgradeBtn";
btn.innerText=`${u.name} (${cost})`;

btn.onclick=()=>{
if(u.type==="buy" && game.money>=cost){
game.money-=cost;
game.autoLevel++;
}
if(u.type==="power" && game.autoClicks>=cost){
game.autoClicks-=cost;
game.autoPower++;
}
if(u.type==="multi" && game.autoClicks>=cost){
game.autoClicks-=cost;
game.autoMultiplier*=2;
}

game.upgradeCosts["a"+i]=cost;
updateStats();
buildUpgrades();
};

autoUpgrades.appendChild(btn);
});

/* REBIRTH */
let btn=document.createElement("button");
btn.className="upgradeBtn";
btn.innerText=`Auto Mult x2 (Lv ${game.permanentUpgrades.autoMultiplierLevel})`;

btn.onclick=()=>{
if(game.rebirthPoints>=5){
game.rebirthPoints-=5;
game.permanentUpgrades.autoMultiplier*=2;
game.permanentUpgrades.autoMultiplierLevel++;
updateStats();
buildUpgrades();
}
};

permUpgrades.appendChild(btn);

}

loadGame();
buildUpgrades();
restartAutoClicker();
updateStats();

</script>
</body>
</html>
```
