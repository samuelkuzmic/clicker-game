```html
<!DOCTYPE html>
<html>
<head>
<title>Clicker Game</title>
<style>
body { font-family: Arial; background:#f0f0f0; margin:0; padding:10px; display:flex; flex-wrap:wrap; gap:20px; }
.column { background:#fff; border-radius:8px; padding:10px; max-width:300px; flex:1 1 300px; display:flex; flex-direction:column; }
button { cursor:pointer; border-radius:5px; border:none; padding:8px; margin:3px 0; width:100%; font-size:12px; }
#clickButton { height:50px; font-size:16px; background:#4CAF50; color:white; }
.upgradeBtn { background:#2196F3; color:white; }
.stat { margin:5px 0; font-size:14px; }
input { width:100%; margin:3px 0; padding:5px; }
</style>
</head>

<body>

<div class="column">
<h3>Clicks</h3>
<button id="clickButton">Click!</button>
<div class="stat" id="score"></div>
<div class="stat" id="clickPowerStat"></div>
<div id="clickUpgrades"></div>
</div>

<div class="column">
<h3>Money</h3>
<div class="stat" id="money"></div>
<div class="stat" id="moneyBonusStat"></div>
<div id="moneyUpgrades"></div>
</div>

<div class="column">
<h3>AutoClicker</h3>
<div class="stat" id="autoStats"></div>
<div id="autoUpgrades"></div>
</div>

<div class="column">
<h3>AutoSeller</h3>
<div class="stat" id="autoSellerStats"></div>
<button id="toggleSeller">Toggle ON/OFF</button>
<div id="autoSellerUpgrades"></div>
</div>

<div class="column">
<h3>Rebirth</h3>
<div class="stat" id="rebirthPoints"></div>
<button id="rebirth">Rebirth</button>
<div id="permUpgrades"></div>
</div>

<div class="column">
<h3>Bank</h3>
<div class="stat" id="bankMoney"></div>
<div class="stat" id="bankTimer"></div>
<input type="number" id="depositAmount" placeholder="Deposit clicks">
<button id="depositBtn">Deposit</button>
<input type="number" id="withdrawAmount" placeholder="Withdraw clicks">
<button id="withdrawBtn">Withdraw</button>
</div>

<script>

let game = {
clicks:0,
money:0,
clicksPerClick:1,
autoLevel:0,
autoPower:1,
autoClicks:0,
autoClickInterval:1000,
autoSellerLevel:0,
autoSellerPower:1,
autoSellerOn:true,
rebirthPoints:0,
permanentUpgrades:{clickBonus:0,autoBonus:0,moneyBonus:0,autoMultiplier:1,autoMultiplierLevel:0},
autoMultiplier:1,
bank:0,
lastBankUpdate:Date.now(),
upgradeCosts:{}
};

let autoClickTimer=null;

/* ===== SAVE/LOAD ===== */
function saveGame(){localStorage.setItem("clickerGameData",JSON.stringify(game));}

function loadGame(){
let data=JSON.parse(localStorage.getItem("clickerGameData")||"{}");
Object.assign(game,data);
if(!game.lastBankUpdate) game.lastBankUpdate=Date.now();
if(!game.permanentUpgrades.autoMultiplier) game.permanentUpgrades.autoMultiplier=1;
if(!game.permanentUpgrades.autoMultiplierLevel) game.permanentUpgrades.autoMultiplierLevel=0;
if(!game.autoMultiplier) game.autoMultiplier=1;
}

/* ===== BANK GROWTH ===== */
function updateBankGrowth(){
let now=Date.now();
let diff=now-game.lastBankUpdate;
let minutes=Math.floor(diff/60000);

if(minutes>0){
for(let i=0;i<minutes;i++){game.bank*=2;}
game.lastBankUpdate=now;
}
}

/* ===== UI ===== */
function updateStats(){

updateBankGrowth();

score.innerText=`Clicks: ${game.clicks}`;
clickPowerStat.innerText=`Clicks per click: ${game.clicksPerClick+game.permanentUpgrades.clickBonus}`;
money.innerText=`Money: $${game.money}`;
moneyBonusStat.innerText=`Money Bonus: ${game.permanentUpgrades.moneyBonus}%`;

autoStats.innerText=`Auto: ${game.autoLevel} | Power: ${game.autoPower} | Speed: ${(game.autoClickInterval/1000).toFixed(2)}s`;

autoSellerStats.innerText=`Level: ${game.autoSellerLevel} | Power: ${game.autoSellerPower} | ${game.autoSellerOn?"ON":"OFF"}`;

rebirthPoints.innerText=`Rebirth Points: ${game.rebirthPoints}`;

bankMoney.innerText=`Bank Clicks: ${game.bank}`;

/* TIMER */
let timeLeft=60000-(Date.now()-game.lastBankUpdate);
bankTimer.innerText=`Next x2 in: ${(timeLeft/1000).toFixed(1)}s`;

saveGame();
}

/* ===== CLICK ===== */
clickButton.onclick=()=>{
game.clicks+=game.clicksPerClick+game.permanentUpgrades.clickBonus;
updateStats();
};

/* ===== AUTOCLICK ===== */
function autoClickerTick(){
if(game.autoLevel>0){
let gen=game.autoLevel*(game.autoPower+game.permanentUpgrades.autoBonus)*(game.autoMultiplier)*(game.permanentUpgrades.autoMultiplier);
game.autoClicks+=gen;
game.clicks+=gen;
updateStats();
}
}

function restartAuto(){
clearInterval(autoClickTimer);
autoClickTimer=setInterval(autoClickerTick,game.autoClickInterval);
}
restartAuto();

/* ===== BANK PASSIVE ===== */
setInterval(()=>{
game.bank*=2;
game.lastBankUpdate=Date.now();
updateStats();
},60000);

/* ===== AUTOS SELLER ===== */
setInterval(()=>{
if(game.autoSellerOn && game.autoSellerLevel>0){
let sell=game.autoSellerLevel*game.autoSellerPower;
if(game.clicks>=sell){
game.clicks-=sell;
game.money+=sell*(1+game.permanentUpgrades.moneyBonus/100);
}
updateStats();
}
},1000);

/* ===== BANK BUTTONS ===== */
depositBtn.onclick=()=>{
let amt=+depositAmount.value||0;
if(amt>0 && game.clicks>=amt){
game.clicks-=amt;
game.bank+=amt;
updateStats();
}
};

withdrawBtn.onclick=()=>{
let amt=+withdrawAmount.value||0;
if(amt>0 && game.bank>=amt){
game.bank-=amt;
game.clicks+=amt;
updateStats();
}
};

/* ===== REBIRTH ===== */
rebirth.onclick=()=>{
if(game.clicks>=1000000){
game.rebirthPoints+=Math.floor(game.clicks/1000000);

game.clicks=0;
game.money=0;
game.clicksPerClick=1;
game.autoLevel=0;
game.autoPower=1;
game.autoClicks=0;
game.autoClickInterval=1000;
game.autoSellerLevel=0;
game.autoSellerPower=1;
game.bank=0;
game.upgradeCosts={};

}
};

/* ===== BUILD UPGRADES ===== */
function buildUpgrades(){

permUpgrades.innerHTML="";

/* REBIRTH UPGRADES */
[
{name:"Click Bonus +2",cost:1,type:"clickBonus",power:2},
{name:"Auto Bonus +2",cost:2,type:"autoBonus",power:2},
{name:"Money Bonus +10%",cost:3,type:"moneyBonus",power:10},
{name:"Auto Multiplier x2",cost:5,type:"autoMultiplier"}
].forEach(u=>{
let btn=document.createElement("button");
let level=u.type==="autoMultiplier"?` (Level ${game.permanentUpgrades.autoMultiplierLevel})`:"";
btn.innerText=`${u.name}${level} (${u.cost} RP)`;

btn.onclick=()=>{
if(game.rebirthPoints>=u.cost){
game.rebirthPoints-=u.cost;

if(u.type==="autoMultiplier"){
game.permanentUpgrades.autoMultiplier*=2;
game.permanentUpgrades.autoMultiplierLevel++;
}else{
game.permanentUpgrades[u.type]+=u.power;
}

updateStats();
buildUpgrades();
}
};

permUpgrades.appendChild(btn);
});

}

loadGame();
buildUpgrades();
updateStats();

</script>
</body>
</html>
