<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>
  <style>
    body { font-family: Arial; background:#f0f0f0; margin:0; padding:10px; display:flex; flex-wrap:wrap; gap:20px; }
    .column { background:#fff; border-radius:8px; padding:10px; max-width:300px; flex:1 1 300px; display:flex; flex-direction:column; }
    button { cursor:pointer; border-radius:5px; border:none; padding:8px; margin:3px 0; width:100%; word-wrap:break-word; font-size:12px; }
    #clickButton { height:50px; font-size:16px; background:#4CAF50; color:white; }
    .upgradeBtn { background:#2196F3; color:white; }
    .stat { margin:5px 0; font-size:14px; }
  </style>
</head>
<body>

<!-- Click Column -->
<div class="column" id="clickColumn">
  <h3>Clicks</h3>
  <button id="clickButton">Click!</button>
  <div class="stat" id="score">Clicks: 0</div>
  <div class="stat" id="clickPowerStat">Clicks per click: 1</div>
  <div id="clickUpgrades"></div>
</div>

<!-- Money Column -->
<div class="column" id="moneyColumn">
  <h3>Money</h3>
  <div class="stat" id="money">Money: $0</div>
  <div class="stat" id="moneyBonusStat">Money Bonus: 0%</div>
  <div id="moneyUpgrades"></div>
</div>

<!-- AutoClicker Column -->
<div class="column" id="autoColumn">
  <h3>AutoClicker</h3>
  <div class="stat" id="autoStats">AutoClickers: 0 | Total AutoClicks: 0 | Power: 1</div>
  <div id="autoUpgrades"></div>
</div>

<!-- AutoSeller Column -->
<div class="column" id="sellerColumn">
  <h3>AutoSeller</h3>
  <div class="stat" id="autoSellerStats">Level: 0 | Power: 1 | Status: ON</div>
  <button id="toggleSeller">Toggle ON/OFF</button>
  <div id="autoSellerUpgrades"></div>
</div>

<!-- Rebirth Column -->
<div class="column" id="rebirthColumn">
  <h3>Rebirth & Permanent Upgrades</h3>
  <div class="stat" id="rebirthPoints">Rebirth Points: 0</div>
  <div class="stat" id="rebirthRequirement">Rebirth requires 1,000,000 clicks</div>
  <button class="upgradeBtn" id="rebirth">Rebirth</button>
  <div id="permUpgrades"></div>
</div>

<script>
let clicks=0, money=0, clicksPerClick=1;
let autoLevel=0, autoPower=1, autoClicks=0;
let autoSellerLevel=0, autoSellerPower=1, autoSellerOn=true;
let rebirthPoints=0;
let permanentUpgrades={clickBonus:0, autoBonus:0, moneyBonus:0};
let rebirthBoughtCount={};

// Upgrades
const upgrades = {
  clickUpgrades:[
    {name:"Click +1", cost:10, power:1},
    {name:"Click +5", cost:50, power:5},
    {name:"Clicker Multiplier", cost:200, power:0},
    {name:"Click +10", cost:500, power:10},
    {name:"Click x3", cost:1000, power:0}
  ],
  moneyUpgrades:[
    {name:"Sell 10 Clicks → $5", clickCost:10, moneyGain:5},
    {name:"Sell 50 Clicks → $30", clickCost:50, moneyGain:30},
    {name:"Sell 100 Clicks → $70", clickCost:100, moneyGain:70},
    {name:"Sell 1000 Clicks → $800", clickCost:1000, moneyGain:800},
    {name:"Sell 10000 Clicks → $10000", clickCost:10000, moneyGain:10000},
    {name:"Sell 100000 Clicks → $100000", clickCost:100000, moneyGain:100000},
    {name:"Sell 1000000 Clicks → $500000", clickCost:1000000, moneyGain:500000}
  ],
  autoUpgrades:[
    {name:"AutoClicker +1", clickCost:10},
    {name:"AutoClicker +5", clickCost:50},
    {name:"AutoClicker Power +1", clickCost:100},
    {name:"AutoClicker Power +2", clickCost:200},
    {name:"AutoClicker Speed x2", clickCost:500}
  ],
  sellerUpgrades:[
    {name:"AutoSeller +1", cost:100},
    {name:"AutoSeller +2", cost:300},
    {name:"AutoSeller Power +1", cost:500},
    {name:"AutoSeller Power +2", cost:1000},
    {name:"AutoSeller Speed x2", cost:2000}
  ],
  permUpgrades:[
    {name:"Click Bonus +1", cost:1, type:"clickBonus"},
    {name:"Click Bonus +2", cost:2, type:"clickBonus"},
    {name:"Auto Bonus +1", cost:2, type:"autoBonus"},
    {name:"Money Bonus +5%", cost:3, type:"moneyBonus"},
    {name:"Money Bonus +10%", cost:5, type:"moneyBonus"}
  ]
};

// DOM refs
const scoreEl=document.getElementById("score");
const clickPowerStat=document.getElementById("clickPowerStat");
const moneyEl=document.getElementById("money");
const moneyBonusStat=document.getElementById("moneyBonusStat");
const autoStatsEl=document.getElementById("autoStats");
const autoSellerStatsEl=document.getElementById("autoSellerStats");
const rebirthPointsEl=document.getElementById("rebirthPoints");
const clickBtn=document.getElementById("clickButton");
const clickUpgradesDiv=document.getElementById("clickUpgrades");
const moneyUpgradesDiv=document.getElementById("moneyUpgrades");
const autoUpgradesDiv=document.getElementById("autoUpgrades");
const autoSellerUpgradesDiv=document.getElementById("autoSellerUpgrades");
const permUpgradesDiv=document.getElementById("permUpgrades");
const toggleSellerBtn=document.getElementById("toggleSeller");

// Create buttons
function createUpgradeButtons(){
  upgrades.clickUpgrades.forEach(u=>{
    let btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.textContent=`${u.name} (Cost: $${u.cost})`;
    btn.onclick=()=>{
      if(money>=u.cost){
        money-=u.cost;
        clicksPerClick+=u.power;
        u.cost=Math.floor(u.cost*1.5);
        btn.textContent=`${u.name} (Cost: $${u.cost})`;
        updateDisplay();
      }
    };
    clickUpgradesDiv.appendChild(btn);
  });

  upgrades.moneyUpgrades.forEach(u=>{
    let btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.textContent=`${u.name} (Cost: ${u.clickCost} clicks)`;
    btn.onclick=()=>{if(clicks>=u.clickCost){clicks-=u.clickCost; money+=Math.floor(u.moneyGain*(1+permanentUpgrades.moneyBonus/100)); updateDisplay();}};
    moneyUpgradesDiv.appendChild(btn);
  });

  upgrades.autoUpgrades.forEach(u=>{
    let btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.textContent=`${u.name} (Cost: ${u.clickCost} clicks)`;
    btn.onclick=()=>{
      if(clicks>=u.clickCost){
        clicks-=u.clickCost;
        autoLevel+=1;
        u.clickCost=Math.floor(u.clickCost*1.5);
        btn.textContent=`${u.name} (Cost: ${u.clickCost} clicks)`;
        updateDisplay();
      }
    };
    autoUpgradesDiv.appendChild(btn);
  });

  upgrades.sellerUpgrades.forEach(u=>{
    let btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.textContent=`${u.name} (Cost: $${u.cost})`;
    btn.onclick=()=>{
      if(money>=u.cost){money-=u.cost; autoSellerLevel+=1; autoSellerPower+=1; u.cost=Math.floor(u.cost*1.5); btn.textContent=`${u.name} (Cost: $${u.cost})`; updateDisplay();}
    };
    autoSellerUpgradesDiv.appendChild(btn);
  });

  upgrades.permUpgrades.forEach((u,i)=>{
    rebirthBoughtCount[i]=0;
    let btn=document.createElement("button");
    btn.className="upgradeBtn";
    btn.textContent=`${u.name} (Cost: ${u.cost} RP | Bought: ${rebirthBoughtCount[i]})`;
    btn.onclick=()=>{
      if(rebirthPoints>=u.cost){
        rebirthPoints-=u.cost;
        rebirthBoughtCount[i]+=1;
        permanentUpgrades[u.type]+=u.type==="moneyBonus"?u.cost*5: u.cost;
        btn.textContent=`${u.name} (Cost: ${u.cost} RP | Bought: ${rebirthBoughtCount[i]})`;
        updateDisplay();
      }
    };
    permUpgradesDiv.appendChild(btn);
  });
}

// Click
clickBtn.addEventListener("click",()=>{clicks+=clicksPerClick+permanentUpgrades.clickBonus; updateDisplay();});

// Auto-generators
setInterval(()=>{
  if(autoLevel>0){
    let gen=autoLevel*(autoPower+permanentUpgrades.autoBonus);
    autoClicks+=gen;
    clicks+=gen;
  }
  if(autoSellerOn && autoSellerLevel>0){
    let sold=Math.min(clicks,autoSellerLevel*autoSellerPower);
    clicks-=sold;
    money+=Math.floor(sold*(1+permanentUpgrades.moneyBonus/100));
  }
  updateDisplay();
},1000);

// Rebirth
document.getElementById("rebirth").addEventListener("click",()=>{
  if(clicks>=1000000){
    let gainedRP=Math.floor(clicks/1000000);
    rebirthPoints+=gainedRP;
    clicks=0; money=0; clicksPerClick=1;
    autoLevel=0; autoPower=1; autoClicks=0;
    autoSellerLevel=0; autoSellerPower=1;
    updateDisplay();
  } else alert("Need 1,000,000 clicks to rebirth");
});

// Toggle AutoSeller
toggleSellerBtn.addEventListener("click",()=>{
  autoSellerOn=!autoSellerOn;
  autoSellerStatsEl.textContent=`Level: ${autoSellerLevel} | Power: ${autoSellerPower} | Status: ${autoSellerOn?"ON":"OFF"}`;
});

// Update display
function updateDisplay(){
  scoreEl.textContent="Clicks: "+clicks;
  moneyEl.textContent="Money: $"+money;
  clickPowerStat.textContent="Clicks per click: "+(clicksPerClick+permanentUpgrades.clickBonus);
  moneyBonusStat.textContent="Money Bonus: "+permanentUpgrades.moneyBonus+"%";
  autoStatsEl.textContent=`AutoClickers: ${autoLevel} | Total AutoClicks: ${autoClicks} | Power: ${autoPower+permanentUpgrades.autoBonus}`;
  autoSellerStatsEl.textContent=`Level: ${autoSellerLevel} | Power: ${autoSellerPower} | Status: ${autoSellerOn?"ON":"OFF"}`;
  rebirthPointsEl.textContent="Rebirth Points: "+rebirthPoints;
}

createUpgradeButtons();
updateDisplay();
</script>

</body>
</html>
